<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>약품 QTY 집계기</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface2: #f0efe9;
      --border: #e2e1d9;
      --border2: #cccbc2;
      --text: #1a1917;
      --text2: #6b6960;
      --text3: #9e9d96;
      --accent: #1a1917;
      --accent-bg: #1a1917;
      --accent-text: #f5f4f0;
      --green: #2d6a4f;
      --green-bg: #d8f3dc;
      --red: #9b2226;
      --red-bg: #fde8e8;
      --radius: 6px;
      --radius-lg: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
    }

    header {
      background: var(--accent-bg);
      color: var(--accent-text);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }

    header h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    header span {
      font-size: 12px;
      opacity: 0.45;
      font-family: 'IBM Plex Mono', monospace;
    }

    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .card-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--text3);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .field-label {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 5px;
      display: block;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="password"],
    input[type="text"] {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      background: var(--surface2);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: var(--border2); }

    .toggle-btn {
      padding: 9px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      font-size: 12px;
      font-family: 'IBM Plex Mono', monospace;
      white-space: nowrap;
    }

    .toggle-btn:hover { background: var(--border); }

    .hint {
      font-size: 11px;
      color: var(--text3);
      margin-top: 6px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .hint a { color: var(--text2); }

    .drop-zone {
      border: 1.5px dashed var(--border2);
      border-radius: var(--radius-lg);
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      background: var(--surface2);
      transition: all 0.15s;
      position: relative;
    }

    .drop-zone.drag {
      border-color: var(--accent);
      background: #f0efe9;
    }

    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }

    .drop-icon {
      font-size: 28px;
      margin-bottom: 8px;
      opacity: 0.4;
    }

    .drop-zone strong {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
    }

    .drop-zone p {
      font-size: 12px;
      color: var(--text3);
      font-family: 'IBM Plex Mono', monospace;
    }

    .file-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--text2);
    }

    .chip button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text3);
      font-size: 14px;
      line-height: 1;
      padding: 0;
      display: flex;
      align-items: center;
    }

    .chip button:hover { color: var(--text); }

    .run-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent-bg);
      color: var(--accent-text);
      border: none;
      border-radius: var(--radius);
      font-family: 'IBM Plex Sans KR', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: 0.01em;
    }

    .run-btn:hover:not(:disabled) { opacity: 0.85; }
    .run-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .progress-wrap {
      margin-top: 10px;
    }

    .progress-bar-track {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 6px;
      display: none;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent-bg);
      border-radius: 2px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .progress-text {
      font-size: 12px;
      color: var(--text2);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 18px;
    }

    .error-box {
      margin-top: 8px;
      padding: 10px 14px;
      background: var(--red-bg);
      color: var(--red);
      border-radius: var(--radius);
      font-size: 12px;
      font-family: 'IBM Plex Mono', monospace;
      display: none;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 1rem;
    }

    .stat-box {
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 14px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text3);
      font-family: 'IBM Plex Mono', monospace;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-val {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .result-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .dl-btn {
      padding: 7px 16px;
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      font-family: 'IBM Plex Sans KR', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .dl-btn:hover { background: var(--surface2); }

    .result-table {
      width: 100%;
      border-collapse: collapse;
    }

    .result-table th {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 500;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .result-table td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--text);
    }

    .result-table tr:last-child td { border-bottom: none; }

    .result-table td:first-child {
      font-family: 'IBM Plex Mono', monospace;
      color: var(--text3);
      font-size: 11px;
      width: 36px;
    }

    .result-table td:last-child,
    .result-table th:last-child {
      text-align: right;
      font-family: 'IBM Plex Mono', monospace;
    }

    .result-table tr.total-row td {
      font-weight: 500;
      border-top: 1px solid var(--border2);
      border-bottom: none;
      background: var(--surface2);
    }

    .result-table tr:not(.total-row):hover td {
      background: var(--surface2);
    }

    #resultSection { display: none; }

    @media (max-width: 500px) {
      main { padding: 1rem 1rem 3rem; }
      header { padding: 1rem; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>약품 QTY 집계기</h1>
  <span>Google Vision OCR → Excel</span>
</header>

<main>

  <div class="card">
    <div class="card-title">Google Vision API 키</div>
    <label class="field-label">본인의 Google Cloud Vision API 키를 입력하세요</label>
    <div class="input-row">
      <input type="password" id="apiKey" placeholder="AIza..." autocomplete="off" />
      <button class="toggle-btn" id="toggleKey">보기</button>
    </div>
    <p class="hint">키는 브라우저에서만 사용되며 서버로 전송되지 않습니다. &nbsp;|&nbsp; <a href="https://cloud.google.com/vision/docs/setup" target="_blank">키 발급 방법 →</a></p>
  </div>

  <div class="card">
    <div class="card-title">이미지 업로드</div>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" multiple accept="image/*" />
      <div class="drop-icon">⊞</div>
      <strong>클릭하거나 드래그하여 이미지 추가</strong>
      <p>JPG · PNG · WEBP · 여러 장 동시 가능</p>
    </div>
    <div class="file-chips" id="fileChips"></div>
  </div>

  <div class="card">
    <button class="run-btn" id="runBtn" disabled>OCR 실행 후 엑셀 추출</button>
    <div class="progress-wrap">
      <div class="progress-bar-track" id="progressTrack">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText"></div>
    </div>
    <div class="error-box" id="errorBox"></div>
  </div>

  <div id="resultSection">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="card" style="padding: 0; overflow: hidden;">
      <div class="result-header" style="padding: 1rem 1.5rem 0;">
        <span class="result-title">약품명별 QTY 합계</span>
        <button class="dl-btn" id="dlBtn">엑셀 다운로드 ↓</button>
      </div>
      <div style="padding: 0 0 0.5rem;">
        <table class="result-table">
          <thead>
            <tr><th>#</th><th>약품명</th><th>QTY 합계</th></tr>
          </thead>
          <tbody id="resultBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</main>

<script>
  const apiKeyInput = document.getElementById('apiKey');
  const toggleKey = document.getElementById('toggleKey');
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileChips = document.getElementById('fileChips');
  const runBtn = document.getElementById('runBtn');
  const progressTrack = document.getElementById('progressTrack');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');
  const errorBox = document.getElementById('errorBox');
  const resultSection = document.getElementById('resultSection');
  const statsGrid = document.getElementById('statsGrid');
  const resultBody = document.getElementById('resultBody');
  const dlBtn = document.getElementById('dlBtn');

  let files = [];
  let aggregated = {};

  toggleKey.addEventListener('click', () => {
    const isPass = apiKeyInput.type === 'password';
    apiKeyInput.type = isPass ? 'text' : 'password';
    toggleKey.textContent = isPass ? '숨기기' : '보기';
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag');
    addFiles([...e.dataTransfer.files]);
  });
  fileInput.addEventListener('change', () => { addFiles([...fileInput.files]); fileInput.value = ''; });

  function addFiles(newFiles) {
    newFiles.filter(f => f.type.startsWith('image/')).forEach(f => {
      if (!files.find(x => x.name === f.name && x.size === f.size)) files.push(f);
    });
    renderChips();
  }

  function renderChips() {
    fileChips.innerHTML = '';
    files.forEach((f, i) => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.innerHTML = `<span>${f.name}</span><button onclick="removeFile(${i})">×</button>`;
      fileChips.appendChild(chip);
    });
    runBtn.disabled = files.length === 0;
  }

  function removeFile(i) { files.splice(i, 1); renderChips(); }

  function toBase64(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  }

  async function ocrImage(base64, apiKey) {
    const res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        requests: [{
          image: { content: base64 },
          features: [{ type: 'DOCUMENT_TEXT_DETECTION' }]
        }]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return data.responses[0].fullTextAnnotation?.text || '';
  }

  function parseQtyData(text) {
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    const result = {};

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const parts = line.split(/\s+/);
      const numParts = parts.filter(p => /^[\d,]+$/.test(p.replace(/,/g, '')));
      if (numParts.length < 2) continue;

      const qty = parseInt(numParts[numParts.length - 2].replace(/,/g, ''), 10);
      if (isNaN(qty) || qty <= 0 || qty > 100000) continue;

      const textParts = parts.filter(p =>
        !/^[\d,]+$/.test(p.replace(/,/g, '')) &&
        p !== '원내' && p !== '원외' &&
        p.length > 1
      );
      if (textParts.length === 0) continue;

      const drugName = textParts.join(' ');
      if (/제약회사|약품명|처방코드|합계|total|제약|회사명/i.test(drugName)) continue;
      if (!/[가-힣]/.test(drugName)) continue;

      result[drugName] = (result[drugName] || 0) + qty;
    }
    return result;
  }

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = 'block';
  }

  function hideError() { errorBox.style.display = 'none'; }

  function setProgress(current, total) {
    const pct = Math.round((current / total) * 100);
    progressFill.style.width = pct + '%';
  }

  runBtn.addEventListener('click', async () => {
    const apiKey = apiKeyInput.value.trim();
    if (!apiKey) { showError('Google Vision API 키를 입력하세요.'); return; }
    if (files.length === 0) return;

    runBtn.disabled = true;
    hideError();
    resultSection.style.display = 'none';
    aggregated = {};
    progressTrack.style.display = 'block';
    progressFill.style.width = '0%';

    for (let i = 0; i < files.length; i++) {
      const f = files[i];
      progressText.textContent = `처리 중 (${i + 1}/${files.length}) — ${f.name}`;
      setProgress(i, files.length);

      try {
        const b64 = await toBase64(f);
        const text = await ocrImage(b64, apiKey);
        const parsed = parseQtyData(text);
        Object.entries(parsed).forEach(([name, qty]) => {
          aggregated[name] = (aggregated[name] || 0) + qty;
        });
      } catch (e) {
        showError(`오류 (${f.name}): ${e.message}`);
        runBtn.disabled = false;
        progressTrack.style.display = 'none';
        progressText.textContent = '';
        return;
      }
    }

    setProgress(files.length, files.length);
    progressText.textContent = `완료 — ${files.length}장 처리됨`;
    renderResult();
    runBtn.disabled = false;
  });

  function renderResult() {
    const entries = Object.entries(aggregated).sort((a, b) => b[1] - a[1]);
    const total = entries.reduce((s, [, v]) => s + v, 0);

    statsGrid.innerHTML = `
      <div class="stat-box"><div class="stat-label">처리 이미지</div><div class="stat-val">${files.length}</div></div>
      <div class="stat-box"><div class="stat-label">약품 종류</div><div class="stat-val">${entries.length}</div></div>
      <div class="stat-box"><div class="stat-label">QTY 총합</div><div class="stat-val">${total.toLocaleString()}</div></div>
    `;

    resultBody.innerHTML =
      entries.map(([name, qty], i) =>
        `<tr><td>${i + 1}</td><td>${name}</td><td>${qty.toLocaleString()}</td></tr>`
      ).join('') +
      `<tr class="total-row"><td></td><td>합계</td><td>${total.toLocaleString()}</td></tr>`;

    resultSection.style.display = 'block';
    resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  dlBtn.addEventListener('click', () => {
    const entries = Object.entries(aggregated).sort((a, b) => b[1] - a[1]);
    const total = entries.reduce((s, [, v]) => s + v, 0);
    const wsData = [
      ['약품명', 'QTY 합계'],
      ...entries,
      ['합계', total]
    ];
    const ws = XLSX.utils.aoa_to_sheet(wsData);
    ws['!cols'] = [{ wch: 32 }, { wch: 12 }];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '약품 QTY 집계');
    XLSX.writeFile(wb, `약품_QTY_집계_${new Date().toISOString().slice(0, 10)}.xlsx`);
  });
</script>
</body>
</html>
